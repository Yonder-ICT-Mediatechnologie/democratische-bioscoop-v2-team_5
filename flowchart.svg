<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1020" font-family="Arial, sans-serif" font-size="13">
  <rect width="1100" height="1020" fill="#111"/>

  <!-- ── Styles ── -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════ SHAPES ═══════════════════════════════════════ -->

  <!-- START -->
  <rect x="400" y="20" width="200" height="48" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="500" y="40" text-anchor="middle" fill="white" font-weight="bold">Start</text>
  <text x="500" y="57" text-anchor="middle" fill="white">gebruiker opent website</text>

  <!-- HOMEPAGE -->
  <rect x="370" y="110" width="260" height="48" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="500" y="130" text-anchor="middle" fill="white" font-weight="bold">Homepage met films</text>
  <text x="500" y="147" text-anchor="middle" fill="#ccc" font-size="11">(overzicht + filters genre/datum)</text>

  <!-- EINDE -->
  <rect x="60" y="230" width="180" height="48" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="150" y="250" text-anchor="middle" fill="white" font-weight="bold">Einde</text>
  <text x="150" y="267" text-anchor="middle" fill="white">gebruiker verlaat site</text>

  <!-- DECISION diamond -->
  <polygon points="500,230 680,290 500,350 320,290" fill="#6b7280" stroke="#aaa" stroke-width="1.5"/>
  <text x="500" y="284" text-anchor="middle" fill="white" font-weight="bold">Wat wil</text>
  <text x="500" y="300" text-anchor="middle" fill="white" font-weight="bold">gebruiker doen?</text>

  <!-- ── Branch 1: Filteren ── -->
  <rect x="60" y="400" width="200" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="160" y="418" text-anchor="middle" fill="white" font-weight="bold">Film filteren</text>
  <text x="160" y="434" text-anchor="middle" fill="#ccc" font-size="11">genre / datum</text>

  <!-- ── Branch 2: Film bekijken ── -->
  <rect x="300" y="400" width="200" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="400" y="418" text-anchor="middle" fill="white" font-weight="bold">Film bekijken</text>
  <text x="400" y="434" text-anchor="middle" fill="#ccc" font-size="11">klik op &#x201C;Details&#x201D;</text>

  <!-- Film detail pagina -->
  <rect x="300" y="495" width="200" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="400" y="513" text-anchor="middle" fill="white" font-weight="bold">Filmdetailpagina</text>
  <text x="400" y="529" text-anchor="middle" fill="#ccc" font-size="11">beschrijving + trailer</text>

  <!-- ── Branch 3: Stemmen ── -->
  <rect x="540" y="400" width="200" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="640" y="418" text-anchor="middle" fill="white" font-weight="bold">Stemmen op film</text>
  <text x="640" y="434" text-anchor="middle" fill="#ccc" font-size="11">stempagina</text>

  <!-- Upvote film -->
  <rect x="540" y="495" width="200" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="640" y="513" text-anchor="middle" fill="white" font-weight="bold">Upvote film</text>
  <text x="640" y="529" text-anchor="middle" fill="#ccc" font-size="11">knop &#x201C;Stem&#x201D;</text>

  <!-- Stem opgeslagen -->
  <rect x="540" y="590" width="200" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="640" y="608" text-anchor="middle" fill="white" font-weight="bold">Stem opgeslagen</text>
  <text x="640" y="624" text-anchor="middle" fill="#ccc" font-size="11">in database</text>

  <!-- ── Branch 4: Reserveren ── -->
  <rect x="790" y="400" width="220" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="900" y="418" text-anchor="middle" fill="white" font-weight="bold">Reserveren</text>
  <text x="900" y="434" text-anchor="middle" fill="#ccc" font-size="11">via nav of filmdetail</text>

  <!-- Datum selecteren (NEW) -->
  <rect x="790" y="495" width="220" height="44" rx="8" fill="#4a5568" stroke="#f5c518" stroke-width="1.5"/>
  <text x="900" y="513" text-anchor="middle" fill="white" font-weight="bold">Datum selecteren</text>
  <text x="900" y="529" text-anchor="middle" fill="#f5c518" font-size="11">verplicht &#x2013; ingesteld via dashboard</text>

  <!-- Stoelen kiezen -->
  <rect x="790" y="590" width="220" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="900" y="608" text-anchor="middle" fill="white" font-weight="bold">Stoelen kiezen</text>
  <text x="900" y="624" text-anchor="middle" fill="#ccc" font-size="11">film + datum zichtbaar bovenaan</text>

  <!-- Reservering bevestigen -->
  <rect x="790" y="685" width="220" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="900" y="703" text-anchor="middle" fill="white" font-weight="bold">Reservering bevestigen</text>
  <text x="900" y="719" text-anchor="middle" fill="#ccc" font-size="11">naam + e-mail invullen</text>

  <!-- Reservering opgeslagen -->
  <rect x="790" y="780" width="220" height="44" rx="8" fill="#5a6375" stroke="#888" stroke-width="1.5"/>
  <text x="900" y="798" text-anchor="middle" fill="white" font-weight="bold">Reservering opgeslagen</text>
  <text x="900" y="814" text-anchor="middle" fill="#ccc" font-size="11">bevestiging op scherm</text>

  <!-- ── Dashboard box (hidden, admin only) ── -->
  <rect x="790" y="50" width="220" height="60" rx="8" fill="#2d3748" stroke="#f5c518" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="900" y="72" text-anchor="middle" fill="#f5c518" font-weight="bold">Dashboard (beheer)</text>
  <text x="900" y="89" text-anchor="middle" fill="#aaa" font-size="11">alleen via directe URL</text>
  <text x="900" y="103" text-anchor="middle" fill="#aaa" font-size="11">niet in navigatiebalk</text>

  <!-- ═══════════════════════════════════════ ARROWS ═══════════════════════════════════════ -->

  <!-- Start → Homepage -->
  <line x1="500" y1="68" x2="500" y2="108" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Homepage → Einde -->
  <line x1="370" y1="134" x2="242" y2="134" stroke="#aaa" stroke-width="1.5"/>
  <line x1="242" y1="134" x2="150" y2="228" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Homepage → Decision -->
  <line x1="500" y1="158" x2="500" y2="228" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision → Filteren -->
  <line x1="320" y1="290" x2="160" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="160" y1="290" x2="160" y2="398" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision → Film bekijken -->
  <line x1="420" y1="340" x2="400" y2="398" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision → Stemmen -->
  <line x1="580" y1="340" x2="640" y2="398" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision → Reserveren -->
  <line x1="680" y1="290" x2="900" y2="290" stroke="#aaa" stroke-width="1.5"/>
  <line x1="900" y1="290" x2="900" y2="398" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Filteren → Homepage (back) -->
  <line x1="160" y1="444" x2="160" y2="880" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="160" y1="880" x2="500" y2="880" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="500" y1="880" x2="500" y2="160" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Film bekijken → Film detail -->
  <line x1="400" y1="444" x2="400" y2="493" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Film detail → Homepage (back) -->
  <line x1="300" y1="517" x2="220" y2="517" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="220" y1="517" x2="220" y2="134" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="220" y1="134" x2="370" y2="134" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Stemmen → Upvote -->
  <line x1="640" y1="444" x2="640" y2="493" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Upvote → Opgeslagen -->
  <line x1="640" y1="539" x2="640" y2="588" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Opgeslagen → Homepage -->
  <line x1="640" y1="634" x2="640" y2="660" stroke="#aaa" stroke-width="1.5"/>
  <line x1="640" y1="660" x2="1040" y2="660" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1040" y1="660" x2="1040" y2="134" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1040" y1="134" x2="632" y2="134" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Reserveren → Datum selecteren -->
  <line x1="900" y1="444" x2="900" y2="493" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Datum selecteren → Stoelen kiezen -->
  <line x1="900" y1="539" x2="900" y2="588" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stoelen kiezen → Bevestigen -->
  <line x1="900" y1="634" x2="900" y2="683" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bevestigen → Opgeslagen -->
  <line x1="900" y1="729" x2="900" y2="778" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Film detail → Reserveren (via Reserveer kaartjes) -->
  <line x1="500" y1="517" x2="788" y2="517" stroke="#f5c518" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="30" y="920" width="500" height="80" rx="6" fill="#1e2535" stroke="#444" stroke-width="1"/>
  <text x="280" y="942" text-anchor="middle" fill="#aaa" font-size="12" font-weight="bold">Legenda</text>
  <line x1="50" y1="965" x2="110" y2="965" stroke="#aaa" stroke-width="1.5"/>
  <text x="118" y="969" fill="#aaa" font-size="11">Normale stroom</text>
  <line x1="200" y1="965" x2="260" y2="965" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="268" y="969" fill="#aaa" font-size="11">Terug naar homepage</text>
  <line x1="50" y1="990" x2="110" y2="990" stroke="#f5c518" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="118" y="994" fill="#f5c518" font-size="11">Via filmdetail naar reservering</text>
  <rect x="330" y="982" width="12" height="12" rx="2" fill="#2d3748" stroke="#f5c518" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="348" y="993" fill="#aaa" font-size="11">Alleen via directe URL (dashboard)</text>
</svg>
